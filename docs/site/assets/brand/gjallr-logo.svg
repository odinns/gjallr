<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 410 130" role="img" aria-labelledby="title desc">
  <title id="title">Gjallr logo</title>
  <desc id="desc">A cold blue route signal mark beside the Gjallr wordmark.</desc>
  <defs>
    <style>
      .grid { stroke: #1a2730; stroke-width: 1.4; }
      .line { fill: none; stroke: #42b8ff; stroke-width: 11; stroke-linecap: round; stroke-linejoin: round; }
      .ghost { fill: none; stroke: #263b48; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; opacity: .7; }
      .accent { fill: #a7ff38; }
      .warn { fill: #ffb238; }
      .text { fill: #e9f2f7; font-family: "IBM Plex Sans", "Inter", "Segoe UI", Arial, sans-serif; font-size: 82px; font-weight: 680; letter-spacing: -1px; }
    </style>
  </defs>
  <g transform="translate(0 5)">
    <path class="grid" d="M10 18H126M10 58H126M10 98H126M26 6V114M66 6V114M106 6V114"/>
    <path class="ghost" d="M26 98H46M66 58H86M106 22H122"/>
    <path class="line" d="M26 98H58V58H98V22H122"/>
    <circle class="accent" cx="26" cy="98" r="9"/>
    <circle class="accent" cx="98" cy="58" r="8"/>
    <circle class="warn" cx="122" cy="22" r="8"/>
  </g>
  <g transform="translate(158 20)">
    <text class="text" x="0" y="80">Gjallr</text>
  </g>
</svg>
